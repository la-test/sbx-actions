name: Docker

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker.yml'
      - 'docker/**'
      - 'src/**'
  pull_request:
    types:
      - closed
      - opened
      - reopened
      - synchronize
    paths:
      - '.github/workflows/docker.yml'
      - 'docker/**'
      - 'src/**'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    permissions:
      pull-requests: write
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: &matrix
        # TODO: Dynamic matrix with `docker-compose config --services` output
        # But this would require something like a dedicated version.sh entrypoint?
        include:
          - context-dir: docker/ansible
            service-name: ansible-controller
            version-cmd: "ansible --version"
            version-cmd-in: "grep -Po '(?<=ansible-core==)[.\\d]+' docker/ansible/requirements.txt"
            version-cmd-out: "grep -Po '(?<=core )[.\\d]+'"
          - context-dir: docker/tofu
            service-name: tofu-shell
            version-cmd: "tofu version"
            version-cmd-in: "grep -Po '(?<=opentofu:)[.\\d]+' docker/tofu/Dockerfile"
            version-cmd-out: "grep -Po '(?<=OpenTofu v)[.\\d]+'"
          - context-dir: docker/nodejs
            service-name: dummy-js
            version-cmd: "node --version"
            version-cmd-in: "grep -Po '(?<=node:)[.\\d]+' docker/nodejs/Dockerfile"
            version-cmd-out: "grep -Po '(?<=v)[.\\d]+'"
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare service
        id: prepare_service
        uses: LeastAuthority/setup-docker-image@ee300e54f801db7fe7e933c7f44f586b0628e9b5 # v1.0.1
        with:
          context-dir: ${{ matrix.context-dir }}
          service-name: ${{ matrix.service-name }}

      - name: Verify version
        id: verify_version
        run: |
          echo "${{ matrix.version-cmd }}" | docker compose run --rm -T "${{ matrix.service-name }}" \
          | tee /dev/stderr \
          | ${{ matrix.version-cmd-out }} \
          | grep -q "$(${{ matrix.version-cmd-in }})"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Get short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Debug
        run: |
          echo ghcr.io/${{ github.repository_owner }}/${{ matrix.service-name }}:${{ github.event_name != 'pull_request' && format('{0}-latest', github.ref_name) || github.head_ref }}
          echo ${{ github.ref_name == 'main' && format('ghcr.io/{0}/{1}:{2}-{3}', github.repository_owner, matrix.service-name, github.ref_name, env.SHORT_SHA) || '' }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 #v7.0.0
        with:
          context: ${{ matrix.context-dir }}
          file: ${{ matrix.context-dir }}/Dockerfile
          push: true
          tags: |
            ghcr.io/la-test/${{ matrix.service-name }}:${{ github.event_name != 'pull_request' && format('{0}-latest', github.ref_name) || format('pr-{0}', github.event.pull_request.number) }}
            ${{ github.ref_name == 'main' && format('ghcr.io/{0}/{1}:{2}-{3}', github.repository_owner, matrix.service-name, github.ref_name, env.SHORT_SHA) || '' }}

      # - name: Scan docker images
      #   id: scan_images
      #   uses: aquasecurity/trivy-action@0.31.0
      #   with:
      #     scan-type: 'image'
      #     image-ref: ${{ github.repository }}_${{ matrix.service-name }}::${{ github.event_name == 'push' && github.ref_name || github.head_ref }}-latest
      #     trivy-config: './docker/trivy.yaml'

  cleanup:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix: *matrix
    steps:
      - name: Delete tag from closed PR
        uses: bots-house/ghcr-delete-image-action@3827559c68cb4dcdf54d813ea9853be6d468d3a4 #v1.1.0
        with:
          owner: "la-test"
          name: "${{ matrix.service-name }}"
          token: "${{ github.token }}"
          tag: "pr-${{ github.event.pull_request.number }}"
        # Only when closing a PR which did not start from the develop or main branch
        if: github.head_ref != 'develop' && github.head_ref != 'main'

      - name: Delete old untagged images
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 #v5.0.0
        with:
          package-name: "${{ matrix.service-name }}"
          package-type: "container"
          min-versions-to-keep: 7
          delete-only-untagged-versions: "true"
